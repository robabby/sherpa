packages:
  - "apps/*"
  - "packages/*"

# pnpm 11 build-script approval (replaces the legacy package.json `pnpm.onlyBuiltDependencies`).
# Only better-sqlite3 needs a native compile; esbuild/msw/sharp ship prebuilt binaries.
allowBuilds:
  better-sqlite3: true
  esbuild: false
  msw: false
  sharp: false

# pnpm 11 hoist settings (relocated from .npmrc — pnpm 11 no longer reads `shamefully-hoist` there).
# apps/studio imports better-sqlite3/better-auth without declaring them, so hoisting to the root
# node_modules is what makes them resolvable to the Next/Turbopack build.
shamefullyHoist: true
publicHoistPattern:
  - "*eslint*"
  - "*prettier*"
